<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Nestor Zamili</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#020617" />
    <meta name="color-scheme" content="dark" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          radial-gradient(circle at top, rgba(34, 211, 238, 0.16), transparent 32%),
          #020617;
        color: #e2e8f0;
        font-family: Inter, system-ui, sans-serif;
      }

      main {
        width: min(100%, 42rem);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 2rem;
        background: rgba(15, 23, 42, 0.88);
        padding: 3rem;
        text-align: center;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
      }

      p {
        margin: 0;
      }

      .eyebrow {
        color: #22d3ee;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-size: 0.75rem;
        font-weight: 700;
      }

      h1 {
        margin: 1rem 0 0;
        font-size: clamp(2.5rem, 7vw, 4rem);
      }

      .copy {
        margin-top: 1rem;
        line-height: 1.8;
        color: #94a3b8;
      }

      a {
        display: inline-flex;
        margin-top: 1.75rem;
        padding: 0.85rem 1.35rem;
        border-radius: 999px;
        background: #0891b2;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">404</p>
      <h1>Page not found</h1>
      <p class="copy">
        The page you requested is not available. Return to the homepage to
        continue exploring the portfolio.
      </p>
      <a href="/">Back to homepage</a>
    </main>
  </body>
</html>
