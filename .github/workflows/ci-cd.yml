name: CI/CD Zamili

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/zamili
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: zamili-cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.vars.outputs.image_ref }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Derive image tag
        id: vars
        run: |
          IMAGE_TAG="$(git rev-parse --short=7 "$GITHUB_SHA")"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.image_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_vm:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy stack on VM
        env:
          IMAGE_REF: ${{ needs.build_and_push.outputs.image_ref }}
          VM_SSH_TARGET: ${{ secrets.VM_SSH_TARGET }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_SSH_KNOWN_HOSTS: ${{ secrets.VM_SSH_KNOWN_HOSTS }}
        run: bash deploy/deploy-prod.sh
