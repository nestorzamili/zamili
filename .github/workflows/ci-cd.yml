name: CI/CD Zamili

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: zamili-cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zamili
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_vm:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy stack on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/zamili:latest
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          envs: IMAGE
          script: |
            set -eu

            APP_DIR="/opt/zamili"
            STACK_FILE="$APP_DIR/docker-compose.yml"

            mkdir -p "$APP_DIR"

            cat > "$STACK_FILE" <<'YAML'
            services:
              zamili:
                image: ${IMAGE}
                container_name: zamili
                restart: unless-stopped

                networks:
                  - caddy_network

                ports:
                  - "127.0.0.1:8080:80"

                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
                  interval: 15s
                  timeout: 5s
                  retries: 5

            networks:
              caddy_network:
                external: true
            YAML

            cd "$APP_DIR"
            docker compose pull
            docker compose up -d --remove-orphans
