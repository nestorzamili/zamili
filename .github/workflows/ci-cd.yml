name: CI/CD Zamili

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: zamili-cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Validate Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm check

      - name: Build application
        run: pnpm build

      - name: Build Docker image
        run: docker build -t zamili:ci .

  deploy_vm:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy stack on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          envs: REPO_URL
          script: |
            set -eu

            APP_DIR="/opt/zamili"
            REPO_DIR="$APP_DIR/repo"
            STACK_FILE="$APP_DIR/docker-compose.yml"

            mkdir -p "$APP_DIR"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            cat > "$STACK_FILE" <<'YAML'
            services:
              zamili:
                build:
                  context: /opt/zamili/repo
                  dockerfile: Dockerfile
                image: zamili:latest
                container_name: zamili
                restart: unless-stopped

                networks:
                  - caddy_network

                ports:
                  - "127.0.0.1:8080:80"

                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
                  interval: 15s
                  timeout: 5s
                  retries: 5

            networks:
              caddy_network:
                external: true
            YAML

            cd "$APP_DIR"
            docker compose up -d --build --remove-orphans
