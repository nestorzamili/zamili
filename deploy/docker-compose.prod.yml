services:
  zamili:
    image: ${IMAGE_REF:?IMAGE_REF is required}
    container_name: zamili
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "80"
    volumes:
      - /var/log/zamili:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
networks:
  proxy:
    external: true